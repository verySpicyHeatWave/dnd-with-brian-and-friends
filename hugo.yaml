# Hugo configuration file
title: D&D With Brian and Friends

# import hextra as module
module:
  imports:
    - path: hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Home
      pageRef: /
      weight: 1
    - name: Characters
      pageRef: /characters
      weight: 2
    - name: Setting
      pageRef: /setting
      weight: 3
    - name: Story
      pageRef: /story
      weight: 4
    - name: Search
      weight: 5
      params:
        type: search

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: false
    displayPoweredBy: true